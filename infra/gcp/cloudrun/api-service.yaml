apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: verdant-api
  labels:
    app: verdant-ai
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: verdant-api-sa
      containerConcurrency: 80
      containers:
        - image: REGISTRY/api:TAG
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: production
          envFrom: []
          # Secrets mounted via --set-secrets in gcloud run deploy
